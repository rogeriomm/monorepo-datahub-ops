name: Go

on:
  push:
    branches: [ "master" ]
    paths:
    - 'tools/labtools-k3s/src/**'
    - '.github/workflows/**'
    
  pull_request:
    branches: [ "master" ]

jobs:

  build:
    runs-on: [self-hosted, pvel-vm]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Tidy modules
      working-directory: ./tools/labtools-k3s/src/
      run: go mod tidy

    - name: Build
      working-directory: ./tools/labtools-k3s/src/
      run: go build -o labtools-k3s

    - name: Show CPU
      run: cat /proc/cpuinfo

    - name: Fedora checks
      run: whoami

