apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: simple-web
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rogeriomm/monorepo-datahub-ops.git
    targetRevision: HEAD
    path: k8s/simple-web/overlays/world1l
  destination:
    server: https://kubernetes.default.svc
    namespace: simple-web
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
